name: Build and Publish Docker Image

on:
  push:
    branches: [main]
    tags: ["v*.*", "v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tagging rules:
          #   push to main       -> :latest
          #   push tag v1.2      -> :v1.2, :1.2, :1 (vX.X and semver shortcuts)
          #   push tag v1.2.3    -> :v1.2.3, :1.2.3, :1.2, :1
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ---------------------------------------------------------------------------
  # Prune untagged image versions left over from previous pushes.
  #
  # WHY NOT actions/delete-package-versions:
  #   Multi-arch builds push a manifest list (index) under the tag, and then
  #   a separate per-platform manifest per arch (amd64, arm64, …). Per-platform
  #   manifests are *untagged* on GHCR — they're only referenced by digest from
  #   the tagged index. The `delete-package-versions` action does not walk these
  #   relationships: it deletes every untagged version it sees. The result is
  #   that `:latest` survives, but its children are gone — and `docker pull`
  #   fails with `manifests/sha256:... not found`.
  #
  # dataaxiom/ghcr-cleanup-action is multi-arch aware: before deleting, it reads
  # each tagged index, collects the digests it references, and excludes them
  # from the cleanup set. Untagged versions that are NOT referenced by any tag
  # (i.e. truly orphaned) are removed.
  # ---------------------------------------------------------------------------
  cleanup-untagged:
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Compute package name
        id: pkg
        run: |
          echo "name=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          echo "owner=${GITHUB_REPOSITORY_OWNER}" >> "$GITHUB_OUTPUT"

      - name: Delete orphaned untagged image versions (multi-arch aware)
        uses: dataaxiom/ghcr-cleanup-action@v1
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          owner: ${{ steps.pkg.outputs.owner }}
          package: ${{ steps.pkg.outputs.name }}
          delete-untagged: true
          validate: true
